services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/lizard.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - UPLOAD_DIR=./uploads
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://frontend:80,http://127.0.0.1:5173
    volumes:
      - backend_uploads:/app/uploads
      - backend_data:/app/data
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend_uploads:
  backend_data:
